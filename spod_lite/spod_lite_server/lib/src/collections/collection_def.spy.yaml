### A user-defined collection. Each row corresponds to a dynamic `collection_<name>` table in Postgres.
class: CollectionDef
table: collection_def

fields:
  name: String
  label: String
  listRule: String, default='admin'
  viewRule: String, default='admin'
  createRule: String, default='admin'
  updateRule: String, default='admin'
  deleteRule: String, default='admin'
  createdAt: DateTime?, defaultPersist=now

indexes:
  collection_def_name_uidx:
    fields: name
    unique: true
